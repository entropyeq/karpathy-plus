<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect width="1200" height="440" rx="20" fill="#ffffff"/>

  <!-- Schema tag over the wiki -->
  <rect x="450" y="38" width="300" height="58" rx="12" fill="#ecfdf5" stroke="#0f766e" stroke-width="1.5"/>
  <text x="600" y="64" text-anchor="middle" font-size="15" font-weight="700" fill="#0f766e">Schema  ·  CLAUDE.md</text>
  <text x="600" y="84" text-anchor="middle" font-size="13" fill="#047857">the conventions Claude follows</text>
  <line x1="600" y1="96" x2="600" y2="150" stroke="#0f766e" stroke-width="1.5" stroke-dasharray="4 5"/>

  <!-- Box 1: Sources -->
  <rect x="50" y="150" width="320" height="152" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="210" y="206" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">Your raw notes</text>
  <text x="210" y="238" text-anchor="middle" font-size="15" fill="#6b7280">sources/  —  transcripts,</text>
  <text x="210" y="259" text-anchor="middle" font-size="15" fill="#6b7280">articles, half-formed ideas</text>

  <!-- Box 2: Wiki -->
  <rect x="440" y="150" width="320" height="152" rx="16" fill="#f0fdfa" stroke="#0f766e" stroke-width="2.5"/>
  <text x="600" y="206" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">A living wiki</text>
  <text x="600" y="238" text-anchor="middle" font-size="15" fill="#6b7280">markdown pages Claude</text>
  <text x="600" y="259" text-anchor="middle" font-size="15" fill="#6b7280">distills and keeps current</text>

  <!-- Box 3: Claude -->
  <rect x="830" y="150" width="320" height="152" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="990" y="206" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">Claude, grounded</text>
  <text x="990" y="238" text-anchor="middle" font-size="15" fill="#6b7280">reads your index at the</text>
  <text x="990" y="259" text-anchor="middle" font-size="15" fill="#6b7280">start of every session</text>

  <!-- arrow 1 -> 2 -->
  <text x="405" y="214" text-anchor="middle" font-size="12" font-weight="600" fill="#6b7280">distill</text>
  <line x1="372" y1="226" x2="430" y2="226" stroke="#111827" stroke-width="2.5"/>
  <polygon points="440,226 426,219 426,233" fill="#111827"/>

  <!-- arrow 2 -> 3 -->
  <text x="795" y="214" text-anchor="middle" font-size="12" font-weight="600" fill="#6b7280">inject</text>
  <line x1="762" y1="226" x2="820" y2="226" stroke="#111827" stroke-width="2.5"/>
  <polygon points="830,226 816,219 816,233" fill="#111827"/>

  <!-- ops layer band -->
  <rect x="50" y="346" width="1100" height="62" rx="14" fill="#0f766e"/>
  <text x="600" y="373" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff" letter-spacing="0.3">KEPT HONEST AUTOMATICALLY</text>
  <text x="600" y="394" text-anchor="middle" font-size="14" fill="#d1fae5">session-start inject   ·   session-end capture   ·   weekly lint   ·   completion gate</text>
</svg>
